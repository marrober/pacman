apiVersion: batch/v1
kind: CronJob
metadata:
  name: base-image-check-and-rebuild
spec:
  schedule: "0 */6 * * *"            # Run the task every 2 hours
  concurrencyPolicy: "Forbid"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            parent: "cronjob-base-image-rebuild"
        spec:
          containers:
          - name: oc-tekton
            image: quay.io/marrober/devex-terminal-4:minimal-terminal-1.4
            command:
            - curl
            - -k
            - -s
            - -d
            - "{}"
            - http://base-image-github-ci-listener-myapp-ci.apps.ocp4.mr-openshift.co.uk/
          restartPolicy: OnFailure
